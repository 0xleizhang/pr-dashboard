<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PR Dashboard</title>
  <script>
    (function() {
      var t = localStorage.getItem('pr-dashboard:theme');
      if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    :root {
      --color-bg: #ffffff;
      --color-fg: #1f2328;
      --color-muted: #656d76;
      --color-border: #d0d7de;
      --color-border-subtle: #eaeef2;
      --color-surface: #f6f8fa;
      --color-surface-2: #eaeef2;
      --color-link: #0969da;
      --color-resizer-hover: #0969da33;
      --color-error-bg: #ffebe9;
      --color-error-border: #ff818266;
      --color-status-fail: #cf222e;
      --color-status-approved: #1a7f37;
      --color-status-warn: #9a6700;
      --color-status-muted: #656d76;
      --color-warn: #9a6700;
      --color-time: #8c959f;
      --color-state-open-bg: #dafbe1;
      --color-state-open-fg: #1a7f37;
      --color-state-draft-bg: #eaeef2;
      --color-state-draft-fg: #656d76;
      --color-state-closed-bg: #ffebe9;
      --color-state-closed-fg: #cf222e;
      --color-state-merged-bg: #fbefff;
      --color-state-merged-fg: #8250df;
      --color-dialog-shadow: rgba(0,0,0,.15);
      --color-backdrop: rgba(0,0,0,.3);
      --color-slider-bg: #d0d7de;
      --color-slider-thumb: white;
      --color-dropdown-bg: #fff;
      --color-owners-pending-bg: #fff8c5;
      --color-owners-pending-border: #e3b341;
      --color-owners-ok-bg: #dafbe1;
      --color-owners-ok-border: #2da44e;
      --color-owners-running-bg: #f6f8fa;
      --color-owners-running-border: #d0d7de;
    }
    [data-theme="dark"] {
      --color-bg: #0d1117;
      --color-fg: #e6edf3;
      --color-muted: #8b949e;
      --color-border: #30363d;
      --color-border-subtle: #21262d;
      --color-surface: #161b22;
      --color-surface-2: #21262d;
      --color-link: #58a6ff;
      --color-resizer-hover: #58a6ff33;
      --color-error-bg: #2d0e0e;
      --color-error-border: #f8514966;
      --color-status-fail: #f85149;
      --color-status-approved: #3fb950;
      --color-status-warn: #d29922;
      --color-status-muted: #8b949e;
      --color-warn: #e3b341;
      --color-time: #8b949e;
      --color-state-open-bg: #1a3a2b;
      --color-state-open-fg: #3fb950;
      --color-state-draft-bg: #21262d;
      --color-state-draft-fg: #8b949e;
      --color-state-closed-bg: #2d0f0f;
      --color-state-closed-fg: #f85149;
      --color-state-merged-bg: #2d1b4e;
      --color-state-merged-fg: #bc8cff;
      --color-dialog-shadow: rgba(0,0,0,.4);
      --color-backdrop: rgba(0,0,0,.6);
      --color-slider-bg: #30363d;
      --color-slider-thumb: #e6edf3;
      --color-dropdown-bg: #161b22;
      --color-owners-pending-bg: #2d2200;
      --color-owners-pending-border: #9e6a03;
      --color-owners-ok-bg: #1a2e1a;
      --color-owners-ok-border: #2ea043;
      --color-owners-running-bg: #21262d;
      --color-owners-running-border: #30363d;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --color-bg: #0d1117;
        --color-fg: #e6edf3;
        --color-muted: #8b949e;
        --color-border: #30363d;
        --color-border-subtle: #21262d;
        --color-surface: #161b22;
        --color-surface-2: #21262d;
        --color-link: #58a6ff;
        --color-resizer-hover: #58a6ff33;
        --color-error-bg: #2d0e0e;
        --color-error-border: #f8514966;
        --color-status-fail: #f85149;
        --color-status-approved: #3fb950;
        --color-status-warn: #d29922;
        --color-status-muted: #8b949e;
        --color-warn: #e3b341;
        --color-time: #8b949e;
        --color-state-open-bg: #1a3a2b;
        --color-state-open-fg: #3fb950;
        --color-state-draft-bg: #21262d;
        --color-state-draft-fg: #8b949e;
        --color-state-closed-bg: #2d0f0f;
        --color-state-closed-fg: #f85149;
        --color-state-merged-bg: #2d1b4e;
        --color-state-merged-fg: #bc8cff;
        --color-dialog-shadow: rgba(0,0,0,.4);
        --color-backdrop: rgba(0,0,0,.6);
        --color-slider-bg: #30363d;
        --color-slider-thumb: #e6edf3;
        --color-dropdown-bg: #161b22;
        --color-owners-pending-bg: #2d2200;
        --color-owners-pending-border: #9e6a03;
        --color-owners-ok-bg: #1a2e1a;
        --color-owners-ok-border: #2ea043;
        --color-owners-running-bg: #21262d;
        --color-owners-running-border: #30363d;
      }
    }
    body { font: 14px/1.5 -apple-system, system-ui, sans-serif; margin: 0; padding: 1.5rem; color: var(--color-fg); background: var(--color-bg); }
    header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    h1 { font-size: 1.1rem; margin: 0; }
    .controls { margin-left: auto; display: flex; gap: .5rem; align-items: center; }
    .refresh-group { display: flex; align-items: center; gap: .25rem; padding: .15rem .4rem; border: 1px solid var(--color-border); border-radius: 6px; background: var(--color-surface); }
    .refresh-group select, .refresh-group button { border: none; background: none; padding: .1rem .2rem; }
    .refresh-group button { cursor: pointer; }
    button, select { font: inherit; padding: .3rem .6rem; border: 1px solid var(--color-border); border-radius: 6px; background: var(--color-surface); color: var(--color-fg); cursor: pointer; }
    table { border-collapse: collapse; width: 100%; table-layout: fixed; }
    th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid var(--color-border-subtle); }
    th { font-size: .8rem; color: var(--color-muted); font-weight: 600; position: relative; white-space: nowrap; overflow: visible; }
    td { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .col-resizer { position: absolute; right: 0; top: 0; bottom: 0; width: 5px; cursor: col-resize; z-index: 1; user-select: none; }
    .col-resizer:hover, .col-resizer.dragging { background: var(--color-resizer-hover); }
    body.col-resizing { cursor: col-resize; user-select: none; }
    tr.pr { cursor: pointer; }
    tr.pr:hover { background: var(--color-surface); }
    .dot { display: inline-block; width: .6rem; height: .6rem; border-radius: 50%; }
    .new { background: var(--color-link); }
    .muted { color: var(--color-muted); }
    .tag { display: inline-block; padding: 0 .35rem; margin-right: .2rem; border-radius: 4px; font-size: .72rem; background: var(--color-surface-2); }
    .repo { color: var(--color-muted); font-size: .8rem; }
    .pr-meta-row { display: flex; align-items: center; flex-wrap: wrap; gap: .25rem; margin-top: .1rem; }
    .jira-link { font-size: .75rem; color: var(--color-muted); text-decoration: none; white-space: nowrap; }
    .jira-link:hover { text-decoration: underline; }
    #error { background: var(--color-error-bg); border: 1px solid var(--color-error-border); padding: .6rem; border-radius: 6px; margin-bottom: 1rem; display: none; }
    #loading-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 9999; display: none;
      background: linear-gradient(90deg, transparent 0%, var(--color-link) 40%, #a5d6ff 60%, transparent 100%);
      background-size: 200% 100%; animation: loading-shimmer 1.4s ease-in-out infinite; }
    #loading-bar.active { display: block; }
    @keyframes loading-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .status-label { cursor: pointer; }
    .status-label:hover { text-decoration: underline; }
    .status-ci_failed     { color: var(--color-status-fail); }
    .status-approved      { color: var(--color-status-approved); }
    .status-author_turn   { color: var(--color-status-fail); }
    .status-part_approved { color: var(--color-status-warn); }
    .status-lead_re_review { color: var(--color-status-warn); }
    .status-wait_re_review { color: var(--color-fg); }
    .status-none          { color: var(--color-status-muted); }
    .status-ci_pending    { color: var(--color-status-warn); }
    .status-ci_unknown    { color: var(--color-status-muted); }
    .comment { margin-top: .25rem; font-size: .8rem; }
    .warn { color: var(--color-warn); font-weight: 600; }
    .state { display: inline-block; padding: 0 .4rem; border-radius: 4px; font-size: .75rem; font-weight: 600; }
    .state-open { background: var(--color-state-open-bg); color: var(--color-state-open-fg); }
    .state-draft { background: var(--color-state-draft-bg); color: var(--color-state-draft-fg); }
    .state-closed { background: var(--color-state-closed-bg); color: var(--color-state-closed-fg); }
    .state-merged { background: var(--color-state-merged-bg); color: var(--color-state-merged-fg); }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--color-fg); }
    .sort-dir { font-size: .7rem; }
    .th-filter-wrap { position: relative; display: inline-block; }
    .th-arrow { cursor: pointer; font-size: .7rem; }
    .filter-chip { display: inline-flex; align-items: center; gap: .3rem; padding: .15rem .5rem; border-radius: 12px; font-size: .75rem; background: var(--color-surface-2); border: 1px solid var(--color-border); color: var(--color-fg); }
    .filter-chip-label { color: var(--color-muted); margin-right: .1rem; }
    .filter-chip-remove { cursor: pointer; color: var(--color-muted); font-size: .8rem; line-height: 1; border: none; background: none; padding: 0; }
    .filter-chip-remove:hover { color: var(--color-fg); }
    .th-dropdown { display: none; position: absolute; top: 100%; left: 0; z-index: 100;
      background: var(--color-dropdown-bg); border: 1px solid var(--color-border); border-radius: 6px;
      box-shadow: 0 4px 12px var(--color-dialog-shadow); min-width: 140px; padding: .25rem 0; }
    .th-dropdown.open { display: block; }
    .th-dropdown label { display: flex; align-items: center; gap: .4rem;
      padding: .25rem .6rem; font-size: .8rem; cursor: pointer; }
    .th-dropdown label:hover { background: var(--color-surface); }
    .td-time { font-size: .75rem; color: var(--color-muted); white-space: nowrap; }
    .td-author { font-size: .8rem; }
    .pr-title-link { color: var(--color-link); text-decoration: none; }
    .pr-title-link:hover { text-decoration: underline; }
    .pr-number-link { color: var(--color-muted); text-decoration: none; font-size: .8rem; }
    .pr-number-link:hover { text-decoration: underline; }
    tr.pr { cursor: default; }
    dialog { border: 1px solid var(--color-border); border-radius: 8px; padding: 1.4rem 1.8rem; min-width: 360px; max-width: 780px; width: 90vw; max-height: 88vh; overflow-y: auto; box-shadow: 0 8px 24px var(--color-dialog-shadow); background: var(--color-bg); color: var(--color-fg); }
    dialog::backdrop { background: var(--color-backdrop); }
    #review-dialog h2 { margin: 0 0 1rem; font-size: .95rem; }
    #review-dialog h3 { margin: .8rem 0 .3rem; font-size: .8rem; color: var(--color-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    #review-dialog ul { margin: 0; padding-left: 1rem; }
    #review-dialog li { margin-bottom: .4rem; font-size: .85rem; }
    .popup-review-body { margin-top: .15rem; font-size: .78rem; color: var(--color-muted); }
    #review-dialog-close, #owners-dialog-close { float: right; background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--color-muted); padding: 0; line-height: 1; }
    #owners-dialog { max-width: 340px; font-size: .85rem; }
    #owners-dialog-content .owners-pending { margin-bottom: 0; }
    .dialog-toolbar { display: flex; align-items: center; gap: .4rem; margin-bottom: .6rem; font-size: .78rem; color: var(--color-muted); }
    .switch { position: relative; display: inline-block; width: 28px; height: 16px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider { position: absolute; inset: 0; background: var(--color-slider-bg); border-radius: 16px; transition: .2s; cursor: pointer; }
    .switch .slider:before { content: ''; position: absolute; width: 10px; height: 10px; left: 3px; top: 3px; background: var(--color-slider-thumb); border-radius: 50%; transition: .2s; }
    .switch input:checked + .slider { background: var(--color-link); }
    .switch input:checked + .slider:before { transform: translateX(12px); }
    .thread-resolved { opacity: .5; }
    .time-ago { font-size: .72rem; color: var(--color-time); margin-left: .3rem; }
    .review-batch { margin-bottom: .4rem; }
    .review-batch-header { font-size: .85rem; font-weight: 600; margin-bottom: .15rem; }
    .batch-collapse-icon { display: inline-block; width: .8rem; font-size: .65rem; }
    .reviewer-group { border: 1px solid var(--color-border); border-radius: 6px; padding: .5rem .7rem; margin-bottom: .6rem; }
    .reviewer-group.review-batch-dismissed { opacity: .5; }
    .reviewer-group-header { font-size: .85rem; font-weight: 600; margin-bottom: .15rem; cursor: pointer; user-select: none; }
    .reviewer-group-header:hover { opacity: .8; }
    .reviewer-group.collapsed .reviewer-group-body { display: none; }
    .review-submission-label { font-size: .78rem; color: var(--color-muted); margin: .4rem 0 .15rem; font-style: italic; }
    .round-date { font-weight: 600; margin-right: .3rem; }
    .review-batch { border-top: 1px solid var(--color-border-subtle); padding-top: .35rem; margin-top: .35rem; }
    .review-batch:first-child { border-top: none; padding-top: 0; margin-top: 0; }
    .review-batch-body { font-size: .78rem; color: var(--color-muted); margin: .15rem 0 .35rem; white-space: pre-wrap; }
    .file-group { margin-top: .45rem; padding-left: .5rem; border-left: 2px solid var(--color-border-subtle); }
    .file-group.thread-resolved { opacity: .5; }
    .file-path { font-family: monospace; font-size: .72rem; color: var(--color-muted); margin-bottom: .15rem; }
    .thread-comment { font-size: .82rem; margin-bottom: .15rem; }
    .thread-reply { margin-left: .8rem; padding-left: .6rem; border-left: 2px solid var(--color-border-subtle); }
    .round-summary { font-size: .72rem; color: var(--color-muted); font-weight: 400; margin-left: .5rem; }
    .comment-num { font-size: .72rem; font-weight: 600; color: var(--color-link); text-decoration: none; margin-right: .15rem; }
    .comment-num:hover { text-decoration: underline; }
    .pr-comments-section { margin-top: .75rem; padding-top: .55rem; border-top: 1px solid var(--color-border-subtle); }
    .pr-comments-label { font-size: .72rem; color: var(--color-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .35rem; }
    .pr-comment-item { border: 1px solid var(--color-border-subtle); border-radius: 6px; padding: .4rem .6rem; margin-bottom: .6rem; }
    .expand-btn { background: none; border: none; padding: 0; font-size: inherit; color: var(--color-link); cursor: pointer; }
    .gh-labels { display: contents; }
    .gh-label { display: inline-block; font-size: .65rem; padding: .05rem .35rem; border-radius: 10px; font-weight: 500; white-space: nowrap; }
    .owners-pending { background: var(--color-owners-pending-bg); border: 1px solid var(--color-owners-pending-border); border-radius: 6px; padding: .4rem .6rem; margin-bottom: .6rem; font-size: .82rem; }
    .owners-list { margin: .25rem 0 0 1rem; padding: 0; list-style: disc; font-size: .8rem; }
    .owners-ok { background: var(--color-owners-ok-bg); border: 1px solid var(--color-owners-ok-border); border-radius: 6px; padding: .3rem .6rem; margin-bottom: .6rem; font-size: .82rem; }
    .owners-tag { display: inline-block; font-size: .7rem; padding: .05rem .3rem; border-radius: 4px; text-decoration: none; color: inherit; }
    .owners-tag.owners-pass { background: var(--color-owners-ok-bg); border: 1px solid var(--color-owners-ok-border); }
    .owners-tag.owners-fail { background: var(--color-owners-pending-bg); border: 1px solid var(--color-owners-pending-border); }
    .owners-tag.owners-running { background: var(--color-owners-running-bg); border: 1px solid var(--color-owners-running-border); }
    .owners-running-banner { background: var(--color-owners-running-bg); border: 1px solid var(--color-owners-running-border); }
.col-config-row { display: flex; align-items: center; gap: .3rem; padding: .2rem .6rem; font-size: .8rem; cursor: default; }
    .col-config-row:hover { background: var(--color-surface); }
    .col-config-row label { display: flex; align-items: center; gap: .4rem; cursor: pointer; flex: 1; padding: 0; }
    .drag-handle { cursor: grab; color: var(--color-muted); user-select: none; font-size: .9rem; line-height: 1; }
    .drag-handle:active { cursor: grabbing; }
    .col-config-row.drag-over { border-top: 2px solid var(--color-link); }
    .seg-control { display: flex; border: 1px solid var(--color-border); border-radius: 6px; overflow: hidden; }
    .seg-btn { border: none; border-right: 1px solid var(--color-border); border-radius: 0; background: var(--color-surface); color: var(--color-muted); padding: .25rem .55rem; font: inherit; font-size: .8rem; cursor: pointer; }
    .seg-btn:last-child { border-right: none; }
    .seg-btn.active { background: var(--color-link); color: #fff; }
    .seg-btn:hover:not(.active) { background: var(--color-surface-2); color: var(--color-fg); }
    .filter-bar-wrap { display: flex; align-items: center; gap: .5rem; margin-bottom: .6rem; min-height: 1.6rem; }
    #filter-bar { flex: 1; display: flex; flex-wrap: wrap; gap: .4rem; }
    #markRead { font-size: .78rem; padding: .2rem .5rem; white-space: nowrap; flex-shrink: 0; }
    #settings-dialog { max-width: 460px; width: 90vw; max-height: 85vh; overflow-y: auto; }
    .settings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
    .settings-header strong { font-size: 1rem; }
    #settings-close { background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--color-muted); padding: 0; line-height: 1; }
    .settings-section { margin-bottom: 1.2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--color-border-subtle); }
    .settings-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .settings-section-title { font-size: .72rem; color: var(--color-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .6rem; }
    .settings-row { display: flex; align-items: center; gap: .5rem; padding: .15rem 0; font-size: .85rem; }
    .settings-row span { flex: 1; }
    .recent-events-wrap { margin-top: .2rem; }
    .recent-events { font-size: .75rem; color: var(--color-muted); white-space: normal; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
    .recent-events.expanded { display: block; overflow: visible; }
    .recent-events-expand { background: none; border: none; padding: 0; font-size: .72rem; color: var(--color-link); cursor: pointer; margin-top: .1rem; display: block; }
    .recent-events-expand:hover { text-decoration: underline; }
    /* ── Mobile (≤ 600px) ─────────────────────────────────────── */
    @media (max-width: 600px) {
      body { padding: .75rem; }

      /* Header: two-row stack */
      header {
        flex-wrap: wrap;
        gap: .5rem;
      }
      header h1 { font-size: 1rem; }
      #subtitle { margin-left: 0; font-size: .75rem; }
      .controls { margin-left: 0; width: 100%; justify-content: flex-start; }
      #days-select, #refresh, #settings-btn { display: none; }
      #me-seg { width: 100%; }
      #me-seg .seg-btn { flex: 1; text-align: center; }

      /* Table → card list */
      #main-table { display: block; }
      #main-table thead { display: none; }
      #main-table tbody { display: block; }

      tr.pr {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: .3rem;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        margin-bottom: .6rem;
        padding: .65rem .75rem;
        cursor: default;
      }
      tr.pr:hover { background: none; }

      /* All td: block by default, then selectively show */
      #main-table td {
        display: none;
        overflow: visible;
        white-space: normal;
        text-overflow: unset;
        padding: 0;
        border: none;
      }

      /* PR title td (last child) — full width, on top */
      #main-table td:last-child {
        display: block;
        width: 100%;
        order: 0;
        margin-bottom: .25rem;
      }

      /* Meta row: state · status · author · updated */
      #main-table .td-state,
      #main-table .td-status,
      #main-table .td-author,
      #main-table .td-updated {
        display: inline-flex;
        align-items: center;
        order: 1;
      }
      #main-table .td-author { font-size: .8rem; color: var(--color-muted); }
      #main-table .td-updated { font-size: .75rem; color: var(--color-muted); }

      /* Column resizer: hidden on mobile */
      .col-resizer { display: none; }

      /* Filter bar */
      .filter-bar-wrap { flex-direction: column; align-items: flex-start; gap: .4rem; }

      /* Dialogs: full-width, taller */
      dialog {
        min-width: auto;
        width: 95vw;
        max-height: 92vh;
        padding: .9rem 1rem;
      }

      /* Review dialog toolbar: stack toggles vertically */
      .dialog-toolbar {
        flex-direction: column;
        align-items: flex-start;
        gap: .5rem;
      }
    }
  </style>
</head>
<body>
  <div id="loading-bar"></div>
  <header>
    <h1>PR Dashboard</h1>
    <span id="subtitle" class="muted"></span>
    <div class="controls">
      <div class="seg-control" id="me-seg">
        <button class="seg-btn active" data-mode="author">Author</button>
        <button class="seg-btn" data-mode="involved">Involved</button>
        <button class="seg-btn" data-mode="all">All</button>
      </div>
      <select id="days-select">
        <option value="7">7d</option>
        <option value="14" selected>14d</option>
        <option value="30">30d</option>
        <option value="90">90d</option>
      </select>
      <button id="refresh">Refresh</button>
      <button id="settings-btn">⚙️</button>
    </div>
  </header>
  <div id="error"></div>
  <div class="filter-bar-wrap">
    <div id="filter-bar"></div>
    <button id="markRead">Mark all read</button>
  </div>
  <table id="main-table">
    <colgroup id="colgroup">
      <col style="width:22px">
      <col data-col-idx="1" style="width:72px">
      <col data-col-idx="3" style="width:90px">
      <col data-col-idx="4" style="width:110px">
      <col data-col-idx="5" style="width:150px">
      <col data-col-idx="7" style="width:88px">
      <col data-col-idx="8" style="width:88px">
      <col>
    </colgroup>
    <thead>
      <tr id="thead-row">
        <th><div class="col-resizer"></div></th>
        <th data-col-idx="1">
          <div class="th-filter-wrap">
            State <span class="th-arrow" id="state-arrow">▾</span>
            <div class="th-dropdown" id="state-dropdown">
              <label><input type="checkbox" value="open" checked> Open</label>
              <label><input type="checkbox" value="draft"> Draft</label>
              <label><input type="checkbox" value="closed"> Closed</label>
              <label><input type="checkbox" value="merged"> Merged</label>
            </div>
          </div>
          <div class="col-resizer"></div>
        </th>
        <th data-col-idx="3">
          <div class="th-filter-wrap">
            <span id="th-author" class="sortable">Author <span class="sort-dir"></span></span>
            <span class="th-arrow" id="author-arrow">▾</span>
            <div class="th-dropdown" id="author-dropdown">
              <label id="author-all-label"><input type="checkbox" id="author-all" checked> All</label>
              <div id="author-list"></div>
            </div>
          </div>
          <div class="col-resizer"></div>
        </th>
        <th data-col-idx="4">
          <div class="th-filter-wrap">
            Participation <span class="th-arrow" id="participation-arrow">▾</span>
            <div class="th-dropdown" id="participation-dropdown">
              <label><input type="checkbox" value="author"> Author</label>
              <label><input type="checkbox" value="reviewer"> Reviewer</label>
              <label><input type="checkbox" value="mention"> Mention</label>
              <label><input type="checkbox" value="assignee"> Assignee</label>
            </div>
          </div>
          <div class="col-resizer"></div>
        </th>
        <th data-col-idx="5" id="th-status" class="sortable">Status <span class="sort-dir"></span><div class="col-resizer"></div></th>
        <th data-col-idx="7" id="th-created" class="sortable">Created <span class="sort-dir"></span><div class="col-resizer"></div></th>
        <th data-col-idx="8" id="th-updated" class="sortable">Updated <span class="sort-dir"></span><div class="col-resizer"></div></th>
        <th>PR</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <p id="empty" class="muted" style="display:none">No PRs found.</p>

  <dialog id="owners-dialog">
    <button id="owners-dialog-close" title="Close">✕</button>
    <div id="owners-dialog-content"></div>
  </dialog>

  <dialog id="review-dialog">
    <button id="review-dialog-close" title="Close">✕</button>
    <h2 id="review-dialog-title"></h2>
    <div class="dialog-toolbar">
      <label class="switch"><input type="checkbox" id="show-closed-toggle" checked><span class="slider"></span></label>
      Hide closed reviews
      &nbsp;&nbsp;
      <label class="switch"><input type="checkbox" id="hide-my-toggle" checked><span class="slider"></span></label>
      Hide my comments
      &nbsp;&nbsp;
      <label class="switch"><input type="checkbox" id="only-unreplied-toggle"><span class="slider"></span></label>
      Only unreplied
    </div>
    <div id="review-dialog-content"></div>
  </dialog>

  <dialog id="settings-dialog">
    <div class="settings-header">
      <strong>Settings</strong>
      <button id="settings-close" title="Close">✕</button>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">View — Columns</div>
      <div id="settings-col-config"></div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Appearance</div>
      <div class="settings-row">
        <span>Theme</span>
        <button id="theme-toggle">💻 Auto</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Refresh</div>
      <div class="settings-row">
        <span>Auto refresh</span>
        <label class="switch"><input type="checkbox" id="auto-refresh-toggle" checked><span class="slider"></span></label>
        <select id="refresh-interval">
          <option value="60">1m</option>
          <option value="300" selected>5m</option>
          <option value="600">10m</option>
          <option value="1800">30m</option>
        </select>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Notifications</div>
      <div class="settings-row">
        <span>🔔 Notify</span>
        <label class="switch"><input type="checkbox" id="notifyToggle"><span class="slider"></span></label>
      </div>
    </div>
  </dialog>

  <script type="module" src="./dashboard.js"></script>
</body>
</html>
